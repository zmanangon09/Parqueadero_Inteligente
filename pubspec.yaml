name: pry_final_parqueadero
description: "Control Inteligente de Parqueaderos - Proyecto académico Flutter."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.13.1
  firebase_auth: ^5.5.4
  cloud_firestore: ^5.6.6
  firebase_storage: ^12.4.5

  # Estado
  provider: ^6.1.2

  # Navegación
  go_router: ^15.1.2

  # Either / functional error handling
  dartz: ^0.10.1

  # Inyección de dependencias
  get_it: ^8.0.3

  # Tipografía
  google_fonts: ^6.2.1

  # Mapas y ubicación
  google_maps_flutter: ^2.9.0
  geolocator: ^13.0.2

  # Variables de entorno
  flutter_dotenv: ^5.2.1

  # Cámara e imágenes para escaneo
  image_picker: ^1.1.2

  # QR: generación (cliente) y escaneo (admin check-in/out)
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.0.1

  # Detección de vehículos con TensorFlow Lite (SSD MobileNet COCO)
  tflite_flutter: ^0.11.0
  image: ^4.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/models/

# Ícono de la app (dart run flutter_launcher_icons)
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#0F766E"
  adaptive_icon_foreground: "assets/icon/foreground.png"
  remove_alpha_ios: true

# Splash nativo sin logo de Flutter (dart run flutter_native_splash:create)
flutter_native_splash:
  color: "#0F766E"
  image: "assets/icon/foreground.png"
  android_12:
    color: "#0F766E"
    image: "assets/icon/foreground.png"
